name: Build and Release Mod

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      version_name:
        description: 'Stable version name (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      # SWITCH: You decide whether or not to publish during manual execution
      create_release:
        description: 'Do you want to create an official release on GitHub?'
        type: boolean
        required: true
        default: false

permissions:
  contents: write
  checks: write

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v7.0.0

      - name: Set up JDK 25 for Gradle
        uses: actions/setup-java@v5.5.0
        with:
          distribution: 'temurin'
          java-version: '25'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x ./gradlew

      - name: Get Short Commit SHA
        id: vars
        uses: actions/github-script@v9.0.0
        with:
          script: |
            const sha = context.sha.substring(0, 7);
            core.setOutput('short_sha', sha);

      - name: Build with Gradle
        run: ./gradlew build --no-daemon --stacktrace
      
      - name: Upload Development Artifact
        if: github.event_name != 'workflow_dispatch' || github.event.inputs.create_release == 'false'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: BetterArchery-dev-${{ steps.vars.outputs.short_sha }}
          path: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-deobf.jar
            !build/libs/*-api.jar
          if-no-files-found: error

      - name: Create Stable GitHub Release
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.create_release == 'true'
        uses: softprops/action-gh-release@v3.0.0
        with:
          tag_name: ${{ github.event.inputs.version_name }}
          name: Release ${{ github.event.inputs.version_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          make_latest: 'false'
          files: |
            build/libs/*.jar
            !build/libs/*-sources.jar
            !build/libs/*-deobf.jar
            !build/libs/*-api.jar

      - name: Upload Build Logs on Failure
        if: failure()
        uses: actions/upload-artifact@v7.0.1
        with:
          name: gradle-failure-logs
          path: |
            **/build/reports/
            **/build/test-results/
          if-no-files-found: ignore
